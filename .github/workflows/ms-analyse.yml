name: MS Analyse - CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - "ms-analyse/**"
      - ".github/workflows/ms-analyse.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "ms-analyse/**"
      - ".github/workflows/ms-analyse.yml"

jobs:
  install:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12"
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Upload virtual environment
        uses: actions/upload-artifact@v4
        with:
          name: ms-analyse-venv
          path: ms-analyse/.venv

  test:
    runs-on: ubuntu-latest
    needs: install
    env:
      PYTHONPATH: ${{ github.workspace }}/ms-analyse
      DATABASE_URL: sqlite:///./test_ms_analyse.db
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Download virtual environment
        uses: actions/download-artifact@v4
        with:
          name: ms-analyse-venv
          path: ms-analyse/.venv

      - name: Run test suite
        run: .venv/bin/python -m pytest -q

  quality:
    runs-on: ubuntu-latest
    needs: test
    env:
      PYTHONPATH: ${{ github.workspace }}/ms-analyse
      DATABASE_URL: sqlite:///./test_ms_analyse.db
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Download virtual environment
        uses: actions/download-artifact@v4
        with:
          name: ms-analyse-venv
          path: ms-analyse/.venv

      - name: Run coverage gate
        run: |
          .venv/bin/python -m pytest --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80 -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: ms-analyse-coverage
          path: ms-analyse/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ms-analyse:ci ./ms-analyse

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "Deployment step ready for ms-analyse."
          echo "Branch a real deployment command here (SSH, registry push, Kubernetes, etc.)."
