name: MS Collecte IoT - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths: [ 'ms-collecte-iot/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'ms-collecte-iot/**' ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12.3"
      PYTHONPATH: ${{ github.workspace }}/ms-collecte-iot
    defaults:
      run:
        working-directory: ms-collecte-iot

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Requis par SonarQube

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests + coverage
        run: |
          pytest test/unit \
            --junitxml=report_tests.xml \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Lint flake8
        run: |
          flake8 src test --output-file=flake8-report.txt

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ms-collecte-iot

      - name: Snyk - Scan dépendances Python
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ms-collecte-iot/requirements.txt --severity-threshold=high
        continue-on-error: true  # pour générer le rapport même si vulnérabilités trouvées

      - name: Save Snyk report
        run: snyk test --file=ms-collecte-iot/requirements.txt 2>&1 | tee snyk-report.txt

  build:
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ms-collecte-iot:ci ./ms-collecte-iot