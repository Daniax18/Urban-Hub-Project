name: MS6 Validateur Capteur - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ms6-validateur-capteur/**'
      - 'docker-compose.yml'
      - '.github/workflows/ms6-validateur.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ms6-validateur-capteur/**'
      - 'docker-compose.yml'
      - '.github/workflows/ms6-validateur.yml'

env:
  PYTHON_VERSION: "3.12.3"
  SERVICE_DIR: ms6-validateur-capteur

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/ms6-validateur-capteur
    defaults:
      run:
        working-directory: ms6-validateur-capteur

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest + coverage
        run: |
          pytest test \
            --junitxml=report_tests.xml \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: ms6-test-reports
          path: |
            ms6-validateur-capteur/coverage.xml
            ms6-validateur-capteur/report_tests.xml

  quality:
    runs-on: ubuntu-latest
    needs: tests
    env:
      PYTHONPATH: ${{ github.workspace }}/ms6-validateur-capteur
    defaults:
      run:
        working-directory: ms6-validateur-capteur

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: ms6-test-reports
          path: ms6-validateur-capteur

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ startsWith(secrets.SONAR_HOST_URL, 'http') && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ms6-validateur-capteur

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk - Scan dependances Python
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high

      - name: Lint flake8
        run: flake8 src test

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ms6-validateur-capteur:ci ./ms6-validateur-capteur
